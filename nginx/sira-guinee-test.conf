# =============================================================================
# SIRA Guinée — Configuration nginx ENV TEST (HTTPS)
# =============================================================================
# Sub-domaines test : test.sira-guinee.com + api-test.sira-guinee.com
# Cohabite avec sira-guinee-prod.conf sur le même VPS.
#
# Path serveur : /etc/nginx/sites-available/sira-guinee-test
# Symlink      : /etc/nginx/sites-enabled/sira-guinee-test
#
# Routage :
#   test.sira-guinee.com      → frontend container test (127.0.0.1:14202)
#   api-test.sira-guinee.com  → gateway test (127.0.0.1:19000)
# =============================================================================


# -----------------------------------------------------------------------------
# HTTP → HTTPS redirect (garde ACME challenge accessible)
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name test.sira-guinee.com api-test.sira-guinee.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# -----------------------------------------------------------------------------
# Frontend Angular — test.sira-guinee.com
# -----------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name test.sira-guinee.com;

    ssl_certificate /etc/letsencrypt/live/sira-guinee.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sira-guinee.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (HSTS plus court en test pour pouvoir rollback facilement)
    add_header Strict-Transport-Security "max-age=86400; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Environment "test" always;

    # Empêcher l'indexation des sous-domaines test côté moteurs de recherche
    add_header X-Robots-Tag "noindex, nofollow" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;

    location / {
        proxy_pass http://127.0.0.1:14202;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}


# -----------------------------------------------------------------------------
# API Gateway — api-test.sira-guinee.com
# -----------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api-test.sira-guinee.com;

    ssl_certificate /etc/letsencrypt/live/sira-guinee.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sira-guinee.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=86400; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Environment "test" always;
    add_header X-Robots-Tag "noindex, nofollow" always;

    client_max_body_size 50M;

    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # CORS — origine restreinte au frontend test
    add_header Access-Control-Allow-Origin "https://test.sira-guinee.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
    add_header Access-Control-Allow-Credentials "true" always;

    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin "https://test.sira-guinee.com";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";
        add_header Access-Control-Allow-Credentials "true";
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
    }

    location / {
        proxy_pass http://127.0.0.1:19000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
