# =============================================================================
# SIRA Guinée — Configuration nginx production (HTTPS)
# =============================================================================
# Usage : remplace `sira-guinee.bootstrap.conf` après que certbot ait obtenu
# les certificats Let's Encrypt pour sira-guinee.com + www + api.
#
# Path serveur : /etc/nginx/sites-available/sira-guinee
# Symlink     : /etc/nginx/sites-enabled/sira-guinee
#
# Routage :
#   sira-guinee.com         → frontend container (127.0.0.1:4202)
#   www.sira-guinee.com     → frontend container (127.0.0.1:4202)
#   api.sira-guinee.com     → gateway Spring Cloud (127.0.0.1:9000)
#                             qui route lui-même /immo-photos/ → MinIO 9100
# =============================================================================


# -----------------------------------------------------------------------------
# HTTP → HTTPS redirect (garde ACME challenge accessible pour renouvellement)
# -----------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name sira-guinee.com www.sira-guinee.com api.sira-guinee.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}


# -----------------------------------------------------------------------------
# Frontend Angular — sira-guinee.com + www
# -----------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sira-guinee.com www.sira-guinee.com;

    # SSL (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/sira-guinee.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sira-guinee.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip (économise bande passante pour Guinée + mobile)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;

    # Reverse proxy vers le container frontend (nginx interne port 80 → exposé 4202)
    location / {
        proxy_pass http://127.0.0.1:4202;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}


# -----------------------------------------------------------------------------
# API Gateway — api.sira-guinee.com
# -----------------------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.sira-guinee.com;

    # SSL (réutilise le cert wildcard généré pour le domaine apex)
    ssl_certificate /etc/letsencrypt/live/sira-guinee.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sira-guinee.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Upload multipart (photos immo, 10MB par photo × ~5 photos par formulaire)
    client_max_body_size 50M;

    # Timeouts pour requêtes longues (uploads, Feign chain)
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # CORS — origin restreint au frontend SIRA Guinée
    # (Spring Cloud Gateway gère aussi CORS via UI_APP_URL, double-coverage acceptée)
    add_header Access-Control-Allow-Origin "https://sira-guinee.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With" always;
    add_header Access-Control-Allow-Credentials "true" always;

    # Préflight CORS (OPTIONS request)
    if ($request_method = 'OPTIONS') {
        add_header Access-Control-Allow-Origin "https://sira-guinee.com";
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, PATCH, OPTIONS";
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Requested-With";
        add_header Access-Control-Allow-Credentials "true";
        add_header Content-Length 0;
        add_header Content-Type text/plain;
        return 204;
    }

    # Proxy vers gateway Spring Cloud
    # gateway gère /authorization/** /user/** /billetterie/** /immo/** + /immo-photos/
    location / {
        proxy_pass http://127.0.0.1:9000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
