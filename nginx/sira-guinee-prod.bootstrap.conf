# =============================================================================
# SIRA Guinée — Bootstrap nginx (HTTP-only, pour le 1er certbot run)
# =============================================================================
# Usage : copier sur OVH avant certbot, écoute port 80 seulement, sert le défi
# ACME challenge depuis /var/www/certbot. Une fois les certificats émis,
# remplacer ce fichier par `sira-guinee.conf` (config finale HTTPS).
#
# Path serveur : /etc/nginx/sites-available/sira-guinee
# Symlink     : /etc/nginx/sites-enabled/sira-guinee
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name sira-guinee.com www.sira-guinee.com api.sira-guinee.com;

    # ACME HTTP-01 challenge — répond aux requêtes Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Toute autre requête → message bootstrap (SSL pas encore actif)
    location / {
        default_type text/plain;
        return 200 'SIRA Guinée — bootstrap nginx, SSL setup in progress';
    }
}
