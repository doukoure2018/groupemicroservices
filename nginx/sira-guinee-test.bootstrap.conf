# =============================================================================
# SIRA Guinée — Bootstrap nginx ENV TEST (HTTP-only, pour le 1er certbot run)
# =============================================================================
# Utilisé UNIQUEMENT si on émet un cert séparé pour test/api-test (alternative
# au cert mutualisé prod). Si on utilise un seul cert wildcard ou multi-SAN
# pour sira-guinee.com + sous-domaines, ce fichier n'est pas nécessaire.
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name test.sira-guinee.com api-test.sira-guinee.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        default_type text/plain;
        return 200 'SIRA Guinée TEST — bootstrap nginx, SSL setup in progress';
    }
}
