name: CD - Build & Deploy SIRA Guinée

# =============================================================================
# Stratégie déploiement SIRA Guinée
# =============================================================================
#   push main      → build + push images Docker Hub → deploy auto sur TEST
#   workflow_dispatch (env=test) → build + push → deploy TEST
#   workflow_dispatch (env=prod) → build + push → deploy PROD (manual gating)
#
# Pré-requis VPS :
#   - Docker installé
#   - nginx + certbot configurés (1er deploy manuel cf docs/deploy-ovh-sira.md)
#   - SSH key authorisée pour le user OVH_USER
#   - Aucun code source du repo nécessaire (tout vient via scp + images Docker Hub)
#
# Secrets GitHub Actions (cf docs/secrets-mapping.md) :
#   Niveau repo (communs) : DOCKERHUB_*, OVH_HOST, OVH_USER, PROD_SSH_KEY,
#                           GMAIL_*, ORANGE_*, GOOGLE_* (placeholders MVP)
#   Environment 'test'    : POSTGRES_PASSWORD, EUREKA_PASSWORD, MINIO_*,
#                           PGADMIN_PASSWORD, SENDER_NAME, MAIL_FROM_NAME, etc.
#   Environment 'prod'    : idem mais valeurs prod
# =============================================================================

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible'
        type: choice
        options:
          - test
          - prod
        default: test
  push:
    branches:
      - main
    paths:
      - microservers/**
      - docker-compose.yml
      - '!microservers/**/test/**'

jobs:
  # ============================================================================
  # JOB 1 — Build & push toutes les images Docker Hub (7 services + flyway)
  # ============================================================================
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      build_number: ${{ steps.build-number.outputs.BUILD_NUMBER }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'maven'

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Configure Maven settings for Docker Hub
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << EOF
          <settings>
            <servers>
              <server>
                <id>registry-1.docker.io</id>
                <username>${{ secrets.DOCKERHUB_USERNAME }}</username>
                <password>${{ secrets.DOCKERHUB_ACCESS_TOKEN }}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Generate build tag
        id: build-number
        run: echo "BUILD_NUMBER=$(date '+%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      # Install parent pom modules (reactor) — couvre 6 services
      - name: Install parent modules
        working-directory: ./microservers
        run: mvn -ntp -B install -DskipTests

      # Build + push parent reactor microservices (6 services)
      - name: Build & push parent-reactor services
        working-directory: ./microservers
        run: |
          set -e
          for svc in discoveryserver gateway authorizationserver userservice billetterieservice immobilierservice; do
            echo "=== Building $svc ==="
            cd "$svc"
            mvn -ntp -B verify -DskipTests jib:dockerBuild
            docker tag doukoure93/${svc}:0.0.1-SNAPSHOT doukoure93/billetterie-${svc}:${{ steps.build-number.outputs.BUILD_NUMBER }}
            docker tag doukoure93/${svc}:0.0.1-SNAPSHOT doukoure93/billetterie-${svc}:latest
            docker push doukoure93/billetterie-${svc}:${{ steps.build-number.outputs.BUILD_NUMBER }}
            docker push doukoure93/billetterie-${svc}:latest
            cd ..
          done

      # notificationserver est orphelin du parent pom (dette historique) → build séparé
      - name: Build & push notificationserver
        working-directory: ./microservers/notificationserver
        run: |
          mvn -ntp -B verify -DskipTests jib:dockerBuild
          docker tag doukoure93/notificationserver:0.0.1-SNAPSHOT doukoure93/billetterie-notificationserver:${{ steps.build-number.outputs.BUILD_NUMBER }}
          docker tag doukoure93/notificationserver:0.0.1-SNAPSHOT doukoure93/billetterie-notificationserver:latest
          docker push doukoure93/billetterie-notificationserver:${{ steps.build-number.outputs.BUILD_NUMBER }}
          docker push doukoure93/billetterie-notificationserver:latest

      # Flyway migrations dans une image dédiée (SQL embarqués, zéro code VPS)
      - name: Build & push flyway-migrations image
        run: |
          docker build \
            -t doukoure93/billetterie-flyway-migrations:${{ steps.build-number.outputs.BUILD_NUMBER }} \
            -t doukoure93/billetterie-flyway-migrations:latest \
            -f microservers/database-migrations/Dockerfile \
            microservers/database-migrations
          docker push doukoure93/billetterie-flyway-migrations:${{ steps.build-number.outputs.BUILD_NUMBER }}
          docker push doukoure93/billetterie-flyway-migrations:latest

  # ============================================================================
  # JOB 2 — Deploy TEST (auto push main + manual dispatch test)
  # ============================================================================
  deploy-test:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'test')
    environment: test

    steps:
      - uses: actions/checkout@v4

      - name: Upload docker-compose.yml + nginx config to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "docker-compose.yml,nginx/sira-guinee-test.conf"
          target: "~/sira-guinee/test-deploy/"
          strip_components: 0

      - name: Deploy to TEST stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: POSTGRES_PASSWORD,EUREKA_PASSWORD,MINIO_ROOT_USER,MINIO_ROOT_PASSWORD,PGADMIN_PASSWORD,GMAIL_USERNAME,GMAIL_APP_PASSWORD,ORANGE_API_CREDENTIALS,ORANGE_SENDER_ADDRESS,SENDER_NAME,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET
          script: |
            set -e

            DEPLOY_DIR=~/sira-guinee/test
            mkdir -p "$DEPLOY_DIR/keys"
            cd "$DEPLOY_DIR"

            # Récupère le compose + nginx déposés par scp
            mv ~/sira-guinee/test-deploy/docker-compose.yml .
            mv ~/sira-guinee/test-deploy/nginx/sira-guinee-test.conf .
            rm -rf ~/sira-guinee/test-deploy

            # Génère .env TEST depuis les secrets de l'environment 'test'
            cat > .env << ENVEOF
            SPRING_PROFILES_ACTIVE=test
            TZ=Africa/Conakry

            POSTGRES_USER=inno2711
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_DB=innodb
            DB_USERNAME=inno2711
            DB_PASSWORD=${POSTGRES_PASSWORD}

            POSTGRES_HOST_PORT=15433
            PGADMIN_HOST_PORT=17001
            MINIO_HOST_PORT=19100
            MINIO_CONSOLE_HOST_PORT=19101
            ZOOKEEPER_HOST_PORT=12183
            KAFKA_HOST_PORT=19093
            EUREKA_HOST_PORT=18761
            GATEWAY_HOST_PORT=19000
            AUTH_HOST_PORT=18090
            USER_HOST_PORT=18091
            BILLET_HOST_PORT=18092
            NOTIF_HOST_PORT=18093
            IMMO_HOST_PORT=18098
            FRONTEND_HOST_PORT=14202

            PGADMIN_EMAIL=admin-test@sira-guinee.com
            PGADMIN_PASSWORD=${PGADMIN_PASSWORD}

            EUREKA_USER=manager
            EUREKA_PASSWORD=${EUREKA_PASSWORD}

            UI_APP_URL=https://test.sira-guinee.com
            OAUTH_ISSUER=https://api-test.sira-guinee.com
            SESSION_COOKIE_SECURE=true

            GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}

            GMAIL_USERNAME=${GMAIL_USERNAME}
            GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
            MAIL_FROM_NAME=SIRA Guinée TEST

            ORANGE_API_CREDENTIALS=${ORANGE_API_CREDENTIALS}
            ORANGE_SENDER_ADDRESS=${ORANGE_SENDER_ADDRESS}
            SENDER_NAME=${SENDER_NAME}

            MINIO_ROOT_USER=${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
            MINIO_PUBLIC_URL=https://api-test.sira-guinee.com

            FRONTEND_IMAGE_TAG=test-latest
            ENVEOF

            sed -i 's/^[[:space:]]*//' .env
            chmod 600 .env

            # Stop test stack (volumes préservés)
            sudo docker compose -p sira-test --env-file .env down --remove-orphans || true

            # Pull images
            sudo docker compose -p sira-test --env-file .env pull

            # Cleanup vieilles images dangling
            sudo docker image prune -f

            # Démarre Postgres seul
            sudo docker compose -p sira-test --env-file .env up -d postgresdb
            sleep 15

            # Attend Postgres
            count=0
            until sudo docker compose -p sira-test --env-file .env exec -T postgresdb pg_isready -U inno2711 -p 5433 2>/dev/null; do
              if [ $count -eq 30 ]; then echo "Postgres timeout"; exit 1; fi
              sleep 3; count=$((count + 1))
            done

            # Run migrations Flyway via image dédiée (zéro fichier SQL sur VPS)
            NETWORK=$(sudo docker network ls --filter "name=sira-test_" --format '{{.Name}}' | head -1)
            sudo docker run --rm --network "$NETWORK" \
              -e FLYWAY_URL="jdbc:postgresql://postgresdb:5433/innodb" \
              -e FLYWAY_USER="inno2711" \
              -e FLYWAY_PASSWORD="${POSTGRES_PASSWORD}" \
              doukoure93/billetterie-flyway-migrations:latest migrate

            # Démarre kafka + zookeeper
            sudo docker compose -p sira-test --env-file .env up -d zookeeper kafka
            sleep 10

            # Démarre tout
            sudo docker compose -p sira-test --env-file .env up -d
            sleep 60

            # Healthcheck services critiques
            for svc in postgresdb minio gateway authorizationserver userservice immobilierservice frontend; do
              if ! sudo docker compose -p sira-test --env-file .env ps "$svc" | grep -q running; then
                echo "Service $svc not running"
                sudo docker compose -p sira-test --env-file .env logs --tail=30 "$svc"
                exit 1
              fi
            done

            # Update nginx config (overwrite)
            sudo mv sira-guinee-test.conf /etc/nginx/sites-available/sira-guinee-test
            sudo ln -sf /etc/nginx/sites-available/sira-guinee-test /etc/nginx/sites-enabled/sira-guinee-test
            sudo nginx -t && sudo systemctl reload nginx

            echo "Deployment TEST OK — https://test.sira-guinee.com"

  # ============================================================================
  # JOB 3 — Deploy PROD (workflow_dispatch only, gating manuel via environment)
  # ============================================================================
  deploy-prod:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'prod'
    environment: prod  # Configurer review/approval dans Settings → Environments

    steps:
      - uses: actions/checkout@v4

      - name: Upload docker-compose.yml + nginx config to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "docker-compose.yml,nginx/sira-guinee-prod.conf"
          target: "~/sira-guinee/prod-deploy/"
          strip_components: 0

      - name: Deploy to PROD stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: POSTGRES_PASSWORD,EUREKA_PASSWORD,MINIO_ROOT_USER,MINIO_ROOT_PASSWORD,PGADMIN_PASSWORD,GMAIL_USERNAME,GMAIL_APP_PASSWORD,ORANGE_API_CREDENTIALS,ORANGE_SENDER_ADDRESS,SENDER_NAME,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET
          script: |
            set -e

            DEPLOY_DIR=~/sira-guinee/prod
            mkdir -p "$DEPLOY_DIR/keys"
            cd "$DEPLOY_DIR"

            mv ~/sira-guinee/prod-deploy/docker-compose.yml .
            mv ~/sira-guinee/prod-deploy/nginx/sira-guinee-prod.conf .
            rm -rf ~/sira-guinee/prod-deploy

            mkdir -p ~/sira-guinee/backups

            # Backup Postgres avant deploy prod — résolution dynamique du
            # container via docker compose -p (pas de nom hardcodé qui casserait
            # si Docker Compose change le suffixe -1, -2, etc.). Skip propre
            # au 1er deploy quand .env ou container n'existent pas encore.
            if [ -f .env ] && sudo docker compose -p sira-prod --env-file .env ps postgresdb --status running --quiet 2>/dev/null | grep -q .; then
              echo "Pre-deploy Postgres backup..."
              sudo docker compose -p sira-prod --env-file .env exec -T postgresdb \
                pg_dumpall -U inno2711 \
                > ~/sira-guinee/backups/prod_$(date +%Y%m%d_%H%M%S).sql || echo "Backup warning (non-blocking)"
            else
              echo "Skipping pre-deploy backup (first deploy or stack down)"
            fi

            # Génère .env PROD depuis les secrets de l'environment 'prod'
            cat > .env << ENVEOF
            SPRING_PROFILES_ACTIVE=prod
            TZ=Africa/Conakry

            POSTGRES_USER=inno2711
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_DB=innodb
            DB_USERNAME=inno2711
            DB_PASSWORD=${POSTGRES_PASSWORD}

            POSTGRES_HOST_PORT=5433
            PGADMIN_HOST_PORT=7001
            MINIO_HOST_PORT=9100
            MINIO_CONSOLE_HOST_PORT=9101
            ZOOKEEPER_HOST_PORT=2183
            KAFKA_HOST_PORT=9093
            EUREKA_HOST_PORT=8761
            GATEWAY_HOST_PORT=9000
            AUTH_HOST_PORT=8090
            USER_HOST_PORT=8091
            BILLET_HOST_PORT=8092
            NOTIF_HOST_PORT=8093
            IMMO_HOST_PORT=8098
            FRONTEND_HOST_PORT=4202

            PGADMIN_EMAIL=admin@sira-guinee.com
            PGADMIN_PASSWORD=${PGADMIN_PASSWORD}

            EUREKA_USER=manager
            EUREKA_PASSWORD=${EUREKA_PASSWORD}

            UI_APP_URL=https://sira-guinee.com
            OAUTH_ISSUER=https://api.sira-guinee.com
            SESSION_COOKIE_SECURE=true

            GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
            GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}

            GMAIL_USERNAME=${GMAIL_USERNAME}
            GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD}
            MAIL_FROM_NAME=SIRA Guinée

            ORANGE_API_CREDENTIALS=${ORANGE_API_CREDENTIALS}
            ORANGE_SENDER_ADDRESS=${ORANGE_SENDER_ADDRESS}
            SENDER_NAME=${SENDER_NAME}

            MINIO_ROOT_USER=${MINIO_ROOT_USER}
            MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
            MINIO_PUBLIC_URL=https://api.sira-guinee.com

            FRONTEND_IMAGE_TAG=prod-latest
            ENVEOF

            sed -i 's/^[[:space:]]*//' .env
            chmod 600 .env

            sudo docker compose -p sira-prod --env-file .env down --remove-orphans || true
            sudo docker compose -p sira-prod --env-file .env pull
            sudo docker image prune -f

            sudo docker compose -p sira-prod --env-file .env up -d postgresdb
            sleep 15

            count=0
            until sudo docker compose -p sira-prod --env-file .env exec -T postgresdb pg_isready -U inno2711 -p 5433 2>/dev/null; do
              if [ $count -eq 30 ]; then echo "Postgres timeout"; exit 1; fi
              sleep 3; count=$((count + 1))
            done

            NETWORK=$(sudo docker network ls --filter "name=sira-prod_" --format '{{.Name}}' | head -1)
            sudo docker run --rm --network "$NETWORK" \
              -e FLYWAY_URL="jdbc:postgresql://postgresdb:5433/innodb" \
              -e FLYWAY_USER="inno2711" \
              -e FLYWAY_PASSWORD="${POSTGRES_PASSWORD}" \
              doukoure93/billetterie-flyway-migrations:latest migrate

            sudo docker compose -p sira-prod --env-file .env up -d zookeeper kafka
            sleep 10

            sudo docker compose -p sira-prod --env-file .env up -d
            sleep 60

            for svc in postgresdb minio gateway authorizationserver userservice immobilierservice frontend; do
              if ! sudo docker compose -p sira-prod --env-file .env ps "$svc" | grep -q running; then
                echo "Service $svc not running"
                sudo docker compose -p sira-prod --env-file .env logs --tail=30 "$svc"
                exit 1
              fi
            done

            sudo mv sira-guinee-prod.conf /etc/nginx/sites-available/sira-guinee-prod
            sudo ln -sf /etc/nginx/sites-available/sira-guinee-prod /etc/nginx/sites-enabled/sira-guinee-prod
            sudo nginx -t && sudo systemctl reload nginx

            echo "Deployment PROD OK — https://sira-guinee.com"
