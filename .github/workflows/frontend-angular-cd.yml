name: CD - Build & Deploy Frontend SIRA Guinée

# =============================================================================
# 2 builds frontend (test + prod) avec build-args URLs distincts.
# Pour MVP : on accepte 2 builds Docker car les URLs sont compile-time
# (cf. dette frontend-fileutils-hardcoded-urls qui visera runtime config plus tard).
# =============================================================================

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environnement cible'
        type: choice
        options:
          - test
          - prod
        default: test
  push:
    branches:
      - main
    paths:
      - frontend/**

jobs:
  # ============================================================================
  # JOB 1 — Build & push 2 images frontend (test + prod tags séparés)
  # ============================================================================
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      build_number: ${{ steps.build-number.outputs.BUILD_NUMBER }}

    steps:
      - uses: actions/checkout@v4

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}

      - name: Generate build tag
        id: build-number
        run: echo "BUILD_NUMBER=$(date '+%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT

      - name: Build & push frontend image TEST
        run: |
          cd frontend/ultima-ng-19.0.0
          docker build \
            -t doukoure93/billetterie-frontend:test-${{ steps.build-number.outputs.BUILD_NUMBER }} \
            -t doukoure93/billetterie-frontend:test-latest \
            --build-arg API_BASE_URL=https://api-test.sira-guinee.com \
            --build-arg AUTH_SERVER_URL=https://api-test.sira-guinee.com/authorization \
            --build-arg FRONTEND_URL=https://test.sira-guinee.com \
            --file Dockerfile \
            .
          docker push doukoure93/billetterie-frontend:test-${{ steps.build-number.outputs.BUILD_NUMBER }}
          docker push doukoure93/billetterie-frontend:test-latest

      - name: Build & push frontend image PROD
        run: |
          cd frontend/ultima-ng-19.0.0
          docker build \
            -t doukoure93/billetterie-frontend:prod-${{ steps.build-number.outputs.BUILD_NUMBER }} \
            -t doukoure93/billetterie-frontend:prod-latest \
            --build-arg API_BASE_URL=https://api.sira-guinee.com \
            --build-arg AUTH_SERVER_URL=https://api.sira-guinee.com/authorization \
            --build-arg FRONTEND_URL=https://sira-guinee.com \
            --file Dockerfile \
            .
          docker push doukoure93/billetterie-frontend:prod-${{ steps.build-number.outputs.BUILD_NUMBER }}
          docker push doukoure93/billetterie-frontend:prod-latest

  # ============================================================================
  # JOB 2 — Deploy TEST (re-pull image frontend test-latest sur stack test)
  # ============================================================================
  deploy-test:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.environment == 'test')
    environment: test

    steps:
      - name: Pull & restart frontend on TEST stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd ~/sira-guinee/test

            # Pull la nouvelle image frontend test-latest
            sudo docker pull doukoure93/billetterie-frontend:test-latest

            # Re-create uniquement le service frontend dans la stack test
            sudo docker compose -p sira-test --env-file .env up -d --force-recreate --no-deps frontend

            sleep 8

            # Health check container
            if ! sudo docker compose -p sira-test --env-file .env ps frontend | grep -q running; then
              echo "Frontend TEST KO"
              sudo docker compose -p sira-test --env-file .env logs --tail=30 frontend
              exit 1
            fi

            echo "Frontend TEST deployed — https://test.sira-guinee.com"

  # ============================================================================
  # JOB 3 — Deploy PROD (workflow_dispatch only, gating manuel)
  # ============================================================================
  deploy-prod:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'workflow_dispatch' && inputs.environment == 'prod'
    environment: prod

    steps:
      - name: Pull & restart frontend on PROD stack
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.OVH_HOST }}
          username: ${{ secrets.OVH_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            set -e
            cd ~/sira-guinee/prod

            sudo docker pull doukoure93/billetterie-frontend:prod-latest
            sudo docker compose -p sira-prod --env-file .env up -d --force-recreate --no-deps frontend

            sleep 8

            if ! sudo docker compose -p sira-prod --env-file .env ps frontend | grep -q running; then
              echo "Frontend PROD KO"
              sudo docker compose -p sira-prod --env-file .env logs --tail=30 frontend
              exit 1
            fi

            echo "Frontend PROD deployed — https://sira-guinee.com"
