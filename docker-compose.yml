# Guidipress - Production Docker Compose
# Domain: guidipress-io.com

services:
  # ==============================================
  # DATABASE SERVICES
  # ==============================================
  postgresdb:
    container_name: billetterie-postgres
    # PostGIS 16-3.4 (Debian-based, multi-arch amd64+arm64).
    # La variante -alpine n'a pas de manifest arm64 (problématique sur Mac M-series).
    # Compatible avec le format de données postgres:16-alpine (volume préservé).
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGPORT: 5433
    expose:
      - 5433
    ports:
      # Port host configurable (défaut 5435 pour éviter conflit avec un Postgres existant).
      # Port interne conteneur reste 5433 → aucun changement côté réseau Docker.
      # Binding 127.0.0.1: → loopback ONLY (jamais d'accès direct depuis internet,
      # même si le firewall est mal configuré). Pour accès distant : tunnel SSH (ssh -L).
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5435}:5433"
    volumes:
      - billetterie_postgres_data:/var/lib/postgresql/data
    networks:
      - billetterie-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -p 5433" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # Database Migration Service
  flyway-migrations:
    image: flyway/flyway:11.3.0
    container_name: billetterie-flyway
    environment:
      FLYWAY_URL: "jdbc:postgresql://postgresdb:5433/${POSTGRES_DB}"
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
      FLYWAY_SCHEMAS: public
      FLYWAY_TABLE: flyway_schema_history
      FLYWAY_BASELINE_ON_MIGRATE: "true"
      FLYWAY_VALIDATE_ON_MIGRATE: "true"
      FLYWAY_OUT_OF_ORDER: "false"
      FLYWAY_CLEAN_DISABLED: "true"
      FLYWAY_BASELINE_VERSION: "1"
    volumes:
      - ./microservers/database-migrations/src/main/resources/db/migration:/flyway/sql
    command: migrate
    networks:
      - billetterie-network
    depends_on:
      postgresdb:
        condition: service_healthy
    restart: "no"
    profiles:
      - migration
      - full

  pgadmin:
    container_name: billetterie-pgadmin
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_LISTEN_PORT: 7001
    depends_on:
      - postgresdb
    ports:
      # Loopback ONLY : pgAdmin = panneau admin BDD, JAMAIS public. Accès dev via SSH tunnel.
      - "127.0.0.1:7001:7001"
    volumes:
      - billetterie_pgadmin:/var/lib/pgadmin
    networks:
      - billetterie-network
    profiles:
      - tools

  # ==============================================
  # OBJECT STORAGE (MinIO - S3-compatible)
  # ==============================================
  # Stockage des photos du module immobilierservice.
  # API S3 exposée sur host:9100 (le port 9000 est pris par le gateway).
  # Console web sur host:9101.
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: billetterie-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      # Loopback ONLY : photos servies via gateway reverse-proxy (Phase 13b), pas direct.
      # Console = admin, jamais public.
      - "127.0.0.1:9100:9000"   # API S3
      - "127.0.0.1:9101:9001"   # Console web
    volumes:
      - billetterie_minio_data:/data
    networks:
      - billetterie-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  # Initialisation des buckets MinIO au démarrage (one-shot).
  # Crée les buckets `immo-photos` et `immo-photos-thumbnails` + accès public en lecture.
  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    container_name: billetterie-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\";
      /usr/bin/mc mb --ignore-existing local/immo-photos;
      /usr/bin/mc mb --ignore-existing local/immo-photos-thumbnails;
      /usr/bin/mc anonymous set download local/immo-photos;
      /usr/bin/mc anonymous set download local/immo-photos-thumbnails;
      echo 'MinIO buckets ready';
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    networks:
      - billetterie-network
    restart: "no"

  # ==============================================
  # MESSAGING SERVICES
  # ==============================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: billetterie-zookeeper
    ports:
      # Loopback ONLY : interne au cluster Kafka, aucun client externe.
      - "127.0.0.1:2183:2183"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2183
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - billetterie-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: billetterie-kafka
    ports:
      # Loopback ONLY : Kafka consommé par services internes via réseau Docker, pas client externe.
      - "127.0.0.1:9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2183
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9093,PLAINTEXT_INTERNAL://kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093,PLAINTEXT_INTERNAL://0.0.0.0:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper
    networks:
      - billetterie-network
    restart: unless-stopped

  # ==============================================
  # MICROSERVICES
  # ==============================================
  discoveryserver:
    image: doukoure93/billetterie-discoveryserver:latest
    container_name: billetterie-discoveryserver
    ports:
      # Loopback ONLY : Eureka = annuaire interne services, JAMAIS public.
      - "127.0.0.1:8761:8761"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresdb:5433/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      EUREKA_USER: ${EUREKA_USER:-manager}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-manager2711}
    volumes:
      - ./logs/discoveryserver:/var/log/discoveryserver
    networks:
      - billetterie-network
    depends_on:
      postgresdb:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8761/ > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  gateway:
    image: doukoure93/billetterie-gateway:latest
    container_name: billetterie-gateway
    ports:
      # Loopback ONLY : nginx prod tape sur 127.0.0.1:9000 (cf. nginx/guidipress-io.conf
      # server_name api.guidipress-io.com → proxy_pass http://127.0.0.1:9000).
      # Plus aucune surface HTTP brute en bypass nginx — tout passe par HTTPS + SSL headers.
      # ATTENTION : si conf nginx cassée → plateforme injoignable. Rollback isolé possible
      # via git revert de ce commit seul.
      - "127.0.0.1:9000:9000"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      EUREKA_USER: ${EUREKA_USER:-manager}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-manager2711}
      JWKS_URI: http://authorizationserver:8090/authorization/oauth2/jwks
    volumes:
      - ./logs/gateway:/var/log/gateway
    networks:
      - billetterie-network
    depends_on:
      discoveryserver:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9000/ > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  authorizationserver:
    image: doukoure93/billetterie-authorizationserver:latest
    container_name: billetterie-authorizationserver
    ports:
      # Loopback ONLY : accédé via gateway (/authorization/**), pas direct.
      - "127.0.0.1:8090:8090"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresdb:5433/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      EUREKA_USER: ${EUREKA_USER:-manager}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-manager2711}
      UI_APP_URL: ${UI_APP_URL}
      OAUTH_ISSUER: ${OAUTH_ISSUER}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      SERVER_FORWARD_HEADERS_STRATEGY: NATIVE
      KAFKA_BOOTSTRAP_SERVERS: kafka:29093
    volumes:
      - ./keys:/app/keys
      - ./logs/authorizationserver:/var/log/authorizationserver
    networks:
      - billetterie-network
    depends_on:
      postgresdb:
        condition: service_healthy
      kafka:
        condition: service_started
      discoveryserver:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8090/authorization/ > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  userservice:
    image: doukoure93/billetterie-userservice:latest
    container_name: billetterie-userservice
    ports:
      # Loopback ONLY : accédé via gateway (/user/**) OU via Feign Eureka interne, jamais direct.
      # NB : /user/getUser/** reste permitAll côté userservice (fuite RGPD #24 corrigée au gateway).
      - "127.0.0.1:8091:8091"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresdb:5433/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      EUREKA_USER: ${EUREKA_USER:-manager}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-manager2711}
      JWKS_URI: http://authorizationserver:8090/authorization/oauth2/jwks
      KAFKA_BOOTSTRAP_SERVERS: kafka:29093
      UI_APP_URL: ${UI_APP_URL}
      ORANGE_API_CREDENTIALS: ${ORANGE_API_CREDENTIALS}
      ORANGE_SENDER_ADDRESS: ${ORANGE_SENDER_ADDRESS}
    volumes:
      - ./keys:/app/keys
      - ./logs/userservice:/var/log/userservice
    networks:
      - billetterie-network
    depends_on:
      postgresdb:
        condition: service_healthy
      kafka:
        condition: service_started
      discoveryserver:
        condition: service_healthy
      authorizationserver:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8091/ > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  billetterieservice:
    image: doukoure93/billetterie-billetterieservice:latest
    container_name: billetterie-billetterieservice
    ports:
      # Loopback ONLY : accédé via gateway (/billetterie/**), pas direct.
      - "127.0.0.1:8092:8092"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresdb:5433/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      EUREKA_USER: ${EUREKA_USER:-manager}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-manager2711}
      JWKS_URI: http://authorizationserver:8090/authorization/oauth2/jwks
      KAFKA_BOOTSTRAP_SERVERS: kafka:29093
      UI_APP_URL: ${UI_APP_URL}
    volumes:
      - ./keys:/app/keys
      - ./logs/billetterieservice:/var/log/billetterieservice
    networks:
      - billetterie-network
    depends_on:
      postgresdb:
        condition: service_healthy
      kafka:
        condition: service_started
      discoveryserver:
        condition: service_healthy
      authorizationserver:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8092/ > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  notificationserver:
    image: doukoure93/billetterie-notificationserver:latest
    container_name: billetterie-notificationserver
    ports:
      # Loopback ONLY : accédé via gateway (/notification/**), pas direct.
      - "127.0.0.1:8093:8093"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresdb:5433/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      EUREKA_USER: ${EUREKA_USER:-manager}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-manager2711}
      JWKS_URI: http://authorizationserver:8090/authorization/oauth2/jwks
      KAFKA_BOOTSTRAP_SERVERS: kafka:29093
      GMAIL_USERNAME: ${GMAIL_USERNAME}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Guidipress}
      UI_APP_URL: ${UI_APP_URL}
    volumes:
      - ./keys:/app/keys
      - ./logs/notificationserver:/var/log/notificationserver
    networks:
      - billetterie-network
    depends_on:
      postgresdb:
        condition: service_healthy
      kafka:
        condition: service_started
      discoveryserver:
        condition: service_healthy
      authorizationserver:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8093/ > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  immobilierservice:
    image: doukoure93/billetterie-immobilierservice:latest
    container_name: billetterie-immobilierservice
    ports:
      # Loopback ONLY : accédé via gateway (/immo/**), pas direct. Photos servies en
      # reverse-proxy par gateway (cf. Phase 13b), pas par accès MinIO direct.
      - "127.0.0.1:8098:8098"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresdb:5433/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      EUREKA_USER: ${EUREKA_USER:-manager}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-manager2711}
      JWKS_URI: http://authorizationserver:8090/authorization/oauth2/jwks
      KAFKA_BOOTSTRAP_SERVERS: kafka:29093
      UI_APP_URL: ${UI_APP_URL}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-http://localhost:9100}
      # TZ explicite : sans ça, Java se base sur l'OS du conteneur (souvent UTC
      # via /etc/timezone Debian/Alpine). Le @Scheduled utilise déjà zone=...
      # dans application.yml, mais cette env var aligne aussi les logs.
      TZ: ${TZ:-Africa/Conakry}
    volumes:
      - ./keys:/app/keys
      - ./logs/immobilierservice:/var/log/immobilierservice
    networks:
      - billetterie-network
    depends_on:
      postgresdb:
        condition: service_healthy
      kafka:
        condition: service_started
      discoveryserver:
        condition: service_healthy
      authorizationserver:
        condition: service_started
      minio:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8098/immo/health > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==============================================
  # FRONTEND
  # ==============================================
  frontend:
    image: doukoure93/billetterie-frontend:latest
    container_name: billetterie-frontend
    ports:
      # Loopback ONLY : nginx prod tape sur 127.0.0.1:4202 (cf. nginx/guidipress-io.conf).
      - "127.0.0.1:4202:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - billetterie-network
    depends_on:
      - gateway
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# ==============================================
# VOLUMES
# ==============================================
volumes:
  billetterie_postgres_data:
  billetterie_pgadmin:
  billetterie_minio_data:

# ==============================================
# NETWORKS
# ==============================================
networks:
  billetterie-network:
    driver: bridge
