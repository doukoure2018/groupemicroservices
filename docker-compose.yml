# =============================================================================
# SIRA Guinée — Docker Compose (test + prod sur même VPS)
# =============================================================================
# Project name (test|prod) propagé via `docker compose -p sira-{env}` côté CLI.
# Container names retirés pour permettre 2 stacks en parallèle sur le même VPS.
# Tous les host ports sont paramétrés via env vars pour permettre les décalages
# test (préfixe 1) vs prod (défauts).
#
# Workflow type :
#   .env injecté par GitHub Actions au runtime (scp depuis runner) avec :
#   - Profils SIRA prod ou test (URLs, secrets, ports)
#   - Aucun fichier `.env*` n'est jamais committé dans le repo (gitignored).
# =============================================================================

services:
  # ==============================================
  # DATABASE
  # ==============================================
  postgresdb:
    image: postgis/postgis:16-3.4
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=64MB"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGPORT: 5433
    expose:
      - 5433
    ports:
      # Loopback ONLY ; jamais public (firewall + binding 127.0.0.1).
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5433}:5433"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - sira-network
    deploy:
      resources:
        limits:
          memory: 1024M
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} -p 5433" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # Migrations Flyway via image dédiée (SQL embarqués, zéro code sur VPS)
  flyway-migrations:
    image: doukoure93/billetterie-flyway-migrations:latest
    environment:
      FLYWAY_URL: "jdbc:postgresql://postgresdb:5433/${POSTGRES_DB}"
      FLYWAY_USER: ${POSTGRES_USER}
      FLYWAY_PASSWORD: ${POSTGRES_PASSWORD}
      FLYWAY_SCHEMAS: public
      FLYWAY_TABLE: flyway_schema_history
      FLYWAY_BASELINE_ON_MIGRATE: "true"
      FLYWAY_VALIDATE_ON_MIGRATE: "true"
      FLYWAY_OUT_OF_ORDER: "false"
      FLYWAY_CLEAN_DISABLED: "true"
      FLYWAY_BASELINE_VERSION: "1"
    command: migrate
    networks:
      - sira-network
    depends_on:
      postgresdb:
        condition: service_healthy
    restart: "no"
    profiles:
      - migration
      - full

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_LISTEN_PORT: 7001
    depends_on:
      - postgresdb
    ports:
      - "127.0.0.1:${PGADMIN_HOST_PORT:-7001}:7001"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - sira-network
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    profiles:
      - tools

  # ==============================================
  # OBJECT STORAGE (MinIO)
  # ==============================================
  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-siraadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changez-moi}
    ports:
      - "127.0.0.1:${MINIO_HOST_PORT:-9100}:9000"     # API S3
      - "127.0.0.1:${MINIO_CONSOLE_HOST_PORT:-9101}:9001"  # Console web
    volumes:
      - minio_data:/data
    networks:
      - sira-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 400M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  minio-init:
    image: minio/mc:RELEASE.2024-11-21T17-21-54Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 \"$$MINIO_ROOT_USER\" \"$$MINIO_ROOT_PASSWORD\";
      /usr/bin/mc mb --ignore-existing local/immo-photos;
      /usr/bin/mc mb --ignore-existing local/immo-photos-thumbnails;
      /usr/bin/mc anonymous set download local/immo-photos;
      /usr/bin/mc anonymous set download local/immo-photos-thumbnails;
      echo 'MinIO buckets ready';
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-siraadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-changez-moi}
    networks:
      - sira-network
    restart: "no"

  # ==============================================
  # MESSAGING (Kafka + Zookeeper)
  # ==============================================
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    ports:
      - "127.0.0.1:${ZOOKEEPER_HOST_PORT:-2183}:2183"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2183
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - sira-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    ports:
      - "127.0.0.1:${KAFKA_HOST_PORT:-9093}:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2183
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9093,PLAINTEXT_INTERNAL://kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093,PLAINTEXT_INTERNAL://0.0.0.0:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xmx512M -Xms256M"
    depends_on:
      - zookeeper
    networks:
      - sira-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 800M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ==============================================
  # MICROSERVICES JAVA
  # ==============================================
  discoveryserver:
    image: doukoure93/billetterie-discoveryserver:latest
    ports:
      - "127.0.0.1:${EUREKA_HOST_PORT:-8761}:8761"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresdb:5433/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      EUREKA_USER: ${EUREKA_USER:-manager}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
    networks:
      - sira-network
    depends_on:
      postgresdb:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # 512M (vs 256M historique) car JVM Java 21 + Spring Boot 3.4 +
          # Eureka Server + Spring Security + Spring Cloud consomme ~260-310M
          # RSS au startup → OOM kill confirmé sur prod TEST 2026-06-03 :
          # "Memory cgroup out of memory: Killed process (java) anon-rss:259320kB"
          memory: 512M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8761/ > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  gateway:
    image: doukoure93/billetterie-gateway:latest
    ports:
      - "127.0.0.1:${GATEWAY_HOST_PORT:-9000}:9000"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      EUREKA_USER: ${EUREKA_USER:-manager}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      JWKS_URI: http://authorizationserver:8090/authorization/oauth2/jwks
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
    networks:
      - sira-network
    depends_on:
      discoveryserver:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # 768M (vs 512M historique) : gateway Spring Cloud + Spring Security
          # consomme ~400M au boot, marge confortable.
          memory: 768M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9000/ > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  authorizationserver:
    image: doukoure93/billetterie-authorizationserver:latest
    ports:
      - "127.0.0.1:${AUTH_HOST_PORT:-8090}:8090"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresdb:5433/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      EUREKA_USER: ${EUREKA_USER:-manager}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      UI_APP_URL: ${UI_APP_URL}
      OAUTH_ISSUER: ${OAUTH_ISSUER}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-__GOOGLE_OAUTH_DISABLED__}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-__GOOGLE_OAUTH_DISABLED__}
      # Audiences acceptées de l'idToken Google (liste CSV : Web,iOS,...).
      # Défaut sur GOOGLE_CLIENT_ID si non fourni (Web seul). Nécessaire pour
      # la vérif idToken mobile multi-plateforme (l'aud iOS != Web client).
      GOOGLE_OAUTH_AUDIENCE: ${GOOGLE_OAUTH_AUDIENCE:-${GOOGLE_CLIENT_ID:-__GOOGLE_OAUTH_DISABLED__}}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      SERVER_FORWARD_HEADERS_STRATEGY: NATIVE
      KAFKA_BOOTSTRAP_SERVERS: kafka:29093
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
    volumes:
      - ./keys:/app/keys
    networks:
      - sira-network
    depends_on:
      postgresdb:
        condition: service_healthy
      kafka:
        condition: service_started
      discoveryserver:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # 768M : 256M était insuffisant pour Spring Boot 3.4 + Java 21 +
          # Spring Cloud + Spring Security. OOM kill confirmé Session B
          # 2026-06-03 (~520M RSS au peak OAuth flow).
          memory: 768M
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8090/authorization/ > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  userservice:
    image: doukoure93/billetterie-userservice:latest
    ports:
      - "127.0.0.1:${USER_HOST_PORT:-8091}:8091"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresdb:5433/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      EUREKA_USER: ${EUREKA_USER:-manager}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      JWKS_URI: http://authorizationserver:8090/authorization/oauth2/jwks
      KAFKA_BOOTSTRAP_SERVERS: kafka:29093
      UI_APP_URL: ${UI_APP_URL}
      ORANGE_API_CREDENTIALS: ${ORANGE_API_CREDENTIALS}
      ORANGE_SENDER_ADDRESS: ${ORANGE_SENDER_ADDRESS}
      SENDER_NAME: ${SENDER_NAME:-SIRA Guinée}
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
    volumes:
      - ./keys:/app/keys
    networks:
      - sira-network
    depends_on:
      postgresdb:
        condition: service_healthy
      kafka:
        condition: service_started
      discoveryserver:
        condition: service_healthy
      authorizationserver:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # 768M : 256M était insuffisant pour Spring Boot 3.4 + Java 21 +
          # Spring Cloud + Spring Security. OOM kill confirmé Session B
          # 2026-06-03 (~520M RSS au peak OAuth flow).
          memory: 768M
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8091/ > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  billetterieservice:
    image: doukoure93/billetterie-billetterieservice:latest
    ports:
      - "127.0.0.1:${BILLET_HOST_PORT:-8092}:8092"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresdb:5433/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      EUREKA_USER: ${EUREKA_USER:-manager}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      # Feign UserClient en URL directe (cf dette feign-eureka-bypass-debt).
      # Port 8091 = port interne userservice en profile prod (cf userservice/application-prod.yml).
      # NB: dev local default profile écoute 8095 (cf userservice/application.yml).
      USERSERVICE_URL: http://userservice:8091
      JWKS_URI: http://authorizationserver:8090/authorization/oauth2/jwks
      KAFKA_BOOTSTRAP_SERVERS: kafka:29093
      UI_APP_URL: ${UI_APP_URL}
      # Demande d'avis post-voyage : délai (h) après arrivée. 24h prod, 0 en TEST.
      BILLETTERIE_AVIS_DELAI_HEURES: ${BILLETTERIE_AVIS_DELAI_HEURES:-24}
      # Firebase Cloud Messaging — clé compte de service base64 (secret .env, vide = push off).
      FCM_SERVICE_ACCOUNT_B64: ${FCM_SERVICE_ACCOUNT_B64:-}
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
    volumes:
      - ./keys:/app/keys
    networks:
      - sira-network
    depends_on:
      postgresdb:
        condition: service_healthy
      kafka:
        condition: service_started
      discoveryserver:
        condition: service_healthy
      authorizationserver:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          # 768M : 256M était insuffisant pour Spring Boot 3.4 + Java 21 +
          # Spring Cloud + Spring Security. OOM kill confirmé Session B
          # 2026-06-03 (~520M RSS au peak OAuth flow).
          memory: 768M
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8092/ > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  notificationserver:
    image: doukoure93/billetterie-notificationserver:latest
    ports:
      - "127.0.0.1:${NOTIF_HOST_PORT:-8093}:8093"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresdb:5433/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      EUREKA_USER: ${EUREKA_USER:-manager}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      JWKS_URI: http://authorizationserver:8090/authorization/oauth2/jwks
      KAFKA_BOOTSTRAP_SERVERS: kafka:29093
      GMAIL_USERNAME: ${GMAIL_USERNAME}
      GMAIL_APP_PASSWORD: ${GMAIL_APP_PASSWORD}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-SIRA Guinée}
      SENDER_NAME: ${SENDER_NAME:-SIRA Guinée}
      ORANGE_API_CREDENTIALS: ${ORANGE_API_CREDENTIALS}
      ORANGE_SENDER_ADDRESS: ${ORANGE_SENDER_ADDRESS}
      IMMO_EMAIL_SEND_ENABLED: ${IMMO_EMAIL_SEND_ENABLED:-false}
      IMMO_SMS_SEND_ENABLED: ${IMMO_SMS_SEND_ENABLED:-false}
      UI_APP_URL: ${UI_APP_URL}
      LC_ALL: C.UTF-8
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
    volumes:
      - ./keys:/app/keys
    networks:
      - sira-network
    depends_on:
      postgresdb:
        condition: service_healthy
      kafka:
        condition: service_started
      discoveryserver:
        condition: service_healthy
      authorizationserver:
        condition: service_started
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 384M
          cpus: '0.5'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8093/ > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  immobilierservice:
    image: doukoure93/billetterie-immobilierservice:latest
    ports:
      - "127.0.0.1:${IMMO_HOST_PORT:-8098}:8098"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgresdb:5433/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      EUREKA_USER: ${EUREKA_USER:-manager}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD}
      # Feign UserClient en URL directe (cf dette feign-eureka-bypass-debt).
      # Port 8091 = port interne userservice en profile prod (cf userservice/application-prod.yml).
      # NB: dev local default profile écoute 8095 (cf userservice/application.yml).
      USERSERVICE_URL: http://userservice:8091
      JWKS_URI: http://authorizationserver:8090/authorization/oauth2/jwks
      KAFKA_BOOTSTRAP_SERVERS: kafka:29093
      UI_APP_URL: ${UI_APP_URL}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-siraadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL:-https://api.sira-guinee.com}
      TZ: ${TZ:-Africa/Conakry}
      JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC"
    volumes:
      - ./keys:/app/keys
    networks:
      - sira-network
    depends_on:
      postgresdb:
        condition: service_healthy
      kafka:
        condition: service_started
      discoveryserver:
        condition: service_healthy
      authorizationserver:
        condition: service_started
      minio:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: '1.0'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:8098/immo/health > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ==============================================
  # FRONTEND
  # ==============================================
  # Image variable selon environnement :
  #   test  → doukoure93/billetterie-frontend:test-latest
  #   prod  → doukoure93/billetterie-frontend:prod-latest
  # Tag injecté par le workflow CI/CD via env var FRONTEND_IMAGE_TAG.
  frontend:
    image: doukoure93/billetterie-frontend:${FRONTEND_IMAGE_TAG:-prod-latest}
    ports:
      - "127.0.0.1:${FRONTEND_HOST_PORT:-4202}:80"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - sira-network
    depends_on:
      - gateway
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.25'
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

# ==============================================
# VOLUMES (préfixés par docker compose -p sira-{env})
# ==============================================
volumes:
  postgres_data:
  pgadmin_data:
  minio_data:

# ==============================================
# NETWORK (préfixé par docker compose -p sira-{env})
# ==============================================
networks:
  sira-network:
    driver: bridge
