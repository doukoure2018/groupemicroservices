server:
  port: 8098

spring:
  datasource:
    url: jdbc:postgresql://postgresdb:5433/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  kafka:
    bootstrap-servers:
      - kafka:29093

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER}:${EUREKA_PASSWORD}@discoveryserver:8761/eureka/

ui:
  app:
    url: https://guidipress-io.com

jwks:
  uri: http://authorizationserver:8090/authorization/oauth2/jwks

minio:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  public-base-url: ${MINIO_PUBLIC_URL}

logging:
  level:
    io.multi.immobilierservice: INFO
