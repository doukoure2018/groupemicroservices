server:
  port: 8098

spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false
  application:
    name: immobilierservice
  profiles:
    active: default
  main:
    allow-bean-definition-overriding: true

  # Multipart upload (photos jusqu'à 10MB + marge pour les headers)
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
      enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5435/innodb
    username: inno2711
    password: manager2711
    hikari:
      connection-test-query: SELECT 1

  jpa:
    database: POSTGRESQL
    open-in-view: false
    generate-ddl: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: innodb

  cloud:
    discovery:
      client:
        composite-indicator:
          enabled: true

  kafka:
    bootstrap-servers:
      - localhost:9093
    template:
      default-topic: NOTIFICATION_TOPIC
    producer:
      group-id: topicgroupid
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        max.request.size: 1300000000
    properties:
      spring:
        json:
          type:
            mapping: Notification:io.multi.immobilierservice.event.Notification
      message.max.bytes: 1300000000
      max.request.size: 1300000000

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://manager:manager2711@localhost:5003/eureka/

ui:
  app:
    url: http://localhost:4202

jwks:
  uri: http://localhost:8090/oauth2/jwks

# Configuration métier immobilier (Phase 9+)
immo:
  limites:
    proprietaire-simple-max: 5
    demarcheur-max: 100
    agent-agence-max: -1
  expiration:
    duree-jours: 60
    rappel-jours-avant: 7
    job-cron: "0 0 2 * * *"
  moderation:
    auto-publish-si-verifie: true
    premiere-annonce-toujours-validation: true
  premium:
    enabled: false
  devises:
    base-stockage: AS_ENTERED
    affichage-conversion: true

# Stockage photos MinIO (Phase 5)
# API S3 exposée sur 9100 (host) → 9000 (container). Le port 9000 host est utilisé par le gateway.
minio:
  endpoint: http://localhost:9100
  access-key: minioadmin
  secret-key: minioadmin
  bucket-photos: immo-photos
  bucket-thumbnails: immo-photos-thumbnails
  thumbnail:
    width: 400
    height: 300
    quality: 0.85
  public-base-url: http://localhost:9100

# Géolocalisation (Phase 8)
geo:
  default-rayon-km: 5
  max-rayon-km: 100

logging:
  level:
    io.multi.immobilierservice: DEBUG
    org.springframework.security: INFO
