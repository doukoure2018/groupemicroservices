# Gateway - Production Configuration
server:
  port: 9000
  forward-headers-strategy: native

spring:
  application:
    name: gateway
  cloud:
    discovery:
      enabled: true
    gateway:
      mvc:
        routes:
          # MVP : routes statiques directes (DNS Docker network) au lieu de
          # `lb://SERVICE` qui dépend du registry Eureka. Eureka client/server
          # ont un bug Content-Type "application/octet-stream" en Spring Cloud
          # 4.2.0 → registry pas peuplé → routing fail → 500 sur tous les
          # endpoints OAuth/API. Single-instance MVP, pas de load balancing
          # nécessaire pour l'instant. Cf [[gateway-eureka-bypass-debt]].
          - id: authorization-server
            uri: http://authorizationserver:8090
            predicates:
              - Path=/authorization/**
          - id: user-service
            uri: http://userservice:8091
            predicates:
              - Path=/user/**
          - id: billetterie-service
            uri: http://billetterieservice:8092
            predicates:
              - Path=/billetterie/**
          - id: notification-service
            uri: http://notificationserver:8093
            predicates:
              - Path=/notification/**
          # immobilierservice était absent en prod → ajouté pour SIRA Guinée
          - id: immobilier-service
            uri: http://immobilierservice:8098
            predicates:
              - Path=/immo/**

eureka:
  client:
    service-url:
      defaultZone: http://${EUREKA_USER:manager}:${EUREKA_PASSWORD:manager2711}@discoveryserver:8761/eureka/
    restclient:
      enabled: true
    registry-fetch-interval-seconds: 5
  instance:
    hostname: gateway
    prefer-ip-address: false
    instance-id: ${spring.application.name}:${random.uuid}

jwks:
  uri: ${JWKS_URI:http://authorizationserver:8090/authorization/oauth2/jwks}

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: INFO
    com.netflix.discovery: WARN
