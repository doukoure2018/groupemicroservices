name: mobile_app
description: "DIGI CRG Mobile Application"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # OAuth2 / Authentication
  flutter_appauth: ^7.0.1
  flutter_secure_storage: ^9.2.2
  google_sign_in: ^6.2.2

  # Push notifications (FCM/APNs) — notif système même app fermée
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5

  # Deep links (Phase 2 : sira://verify auto-login)
  app_links: ^6.3.2

  # HTTP & API
  http: ^1.2.2
  dio: ^5.7.0

  # State Management
  provider: ^6.1.2

  # Navigation
  go_router: ^14.6.2

  # Utils
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.3
  jwt_decoder: ^2.0.1
  share_plus: ^10.1.4

  # QR Code & PDF
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2
  pdf: ^3.11.1
  printing: ^5.13.3
  path_provider: ^2.1.4

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.4.1
  flutter_cache_manager: ^3.4.1   # Phase Partage — utilisé directement par ShareService (déjà transitive de cached_network_image, déclaration explicite pour le lint)
  geolocator: ^13.0.1             # Phase Géoloc-1 — GPS auto wizard + filtre "Près de moi" recherche (Géoloc-2)
  flutter_map: ^7.0.2             # Phase Géoloc-3 — mini-carte fiche + picker draggable wizard (tiles OSM)
  latlong2: ^0.9.1                # Phase Géoloc-3 — LatLng utility, dep directe de flutter_map
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  photo_view: ^0.15.0          # Phase 15.2d-2 — galerie photos fullscreen zoomable (premier ajout pubspec post-15.1)
  image_picker: ^1.1.2         # Phase 15.2e-3 — pick gallery + camera pour wizard publication

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icon.jpeg"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/icon.jpeg"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/json/
