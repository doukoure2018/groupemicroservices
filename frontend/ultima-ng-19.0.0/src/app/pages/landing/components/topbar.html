<header class="fixed top-0 left-0 right-0 z-50 px-4 lg:px-8 pt-4">
  <div
    class="mx-auto max-w-7xl rounded-2xl transition-all duration-500"
    [class]="scrolled() ? 'bg-white/95 shadow-xl shadow-black/[0.08] backdrop-blur-xl' : 'bg-white/90 shadow-lg shadow-black/5 backdrop-blur-md'"
  >
    <div class="flex items-center justify-between px-4 py-3 lg:px-6">
      <!-- Logo -->
      <a href="#" class="group flex items-center shrink-0">
        <!-- -my-* négatif : logo déborde visuellement du navbar sans pousser sa hauteur. -->
        <img src="/images/logo-sira-guinee-no-bg.png" alt="SIRA Guinée — Transport & Immobilier"
          class="h-20 w-auto -my-4 lg:h-28 lg:-my-6 transition-transform duration-300 group-hover:scale-105" />
      </a>

      <!-- Desktop nav -->
      <nav class="hidden items-center gap-0.5 lg:flex" aria-label="Navigation principale">
        @for (link of navLinks; track link.label) {
          <a
            [href]="link.href"
            class="relative rounded-lg px-3.5 py-2 text-sm font-medium transition-all duration-300"
            [class]="link.active ? 'text-[#F2A900]' : 'text-[#16451F]/70 hover:text-[#16451F]'"
          >
            {{ link.label }}
            @if (link.active) {
              <span class="absolute bottom-0.5 left-1/2 h-0.5 w-5 -translate-x-1/2 rounded-full bg-[#F2A900]"></span>
            }
          </a>
        }
      </nav>

      <!-- Desktop right -->
      <div class="hidden items-center gap-3 lg:flex shrink-0">
        <a
          href="tel:+224620000000"
          class="flex h-10 w-10 items-center justify-center rounded-full border-2 border-[#16451F]/10 text-[#16451F] transition-all duration-300 hover:border-[#F2A900]/30 hover:bg-[#F2A900] hover:text-[#16451F]/5 hover:text-[#F2A900]"
          aria-label="Appelez-nous"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
          </svg>
        </a>
        <a
          [href]="loginUrl"
          class="rounded-full border-2 border-[#16451F]/15 px-5 py-2.5 text-sm font-semibold text-[#16451F] transition-all duration-300 hover:border-[#F2A900]/40 hover:text-[#F2A900]"
        >
          Se connecter
        </a>
        <a
          [routerLink]="['/auth/register']"
          class="rounded-full bg-gradient-to-r from-[#F2A900] to-[#D99700] px-5 py-2.5 text-sm font-semibold text-[#16451F] shadow-lg shadow-[#F2A900]/25 transition-all duration-300 hover:-translate-y-0.5 hover:shadow-xl hover:shadow-[#F2A900]/30"
        >
          S'inscrire
        </a>
      </div>

      <!-- Mobile burger -->
      <button
        (click)="toggleMobile()"
        class="relative flex h-10 w-10 items-center justify-center rounded-xl border border-[#16451F]/10 text-[#16451F] transition-all duration-300 hover:bg-[#F2A900] hover:text-[#16451F]/5 hover:text-[#F2A900] lg:hidden"
        [attr.aria-label]="mobileOpen() ? 'Fermer le menu' : 'Ouvrir le menu'"
      >
        <div class="transition-all duration-300" [class.rotate-90]="mobileOpen()" [class.scale-110]="mobileOpen()">
          @if (mobileOpen()) {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
          }
        </div>
      </button>
    </div>

    <!-- Mobile menu -->
    <div
      class="overflow-hidden border-t transition-all duration-500 lg:hidden"
      [class]="mobileOpen() ? 'max-h-[500px] border-[#16451F]/5 opacity-100' : 'max-h-0 border-transparent opacity-0'"
    >
      <nav class="flex flex-col gap-1 px-4 py-4" aria-label="Navigation mobile">
        @for (link of navLinks; track link.label; let i = $index) {
          <a
            [href]="link.href"
            (click)="closeMobile()"
            class="rounded-xl px-4 py-3 text-sm font-medium transition-all duration-300"
            [class]="link.active ? 'bg-[#F2A900]/10 text-[#F2A900]' : 'text-[#16451F]/70 hover:bg-[#16451F]/5 hover:pl-6 hover:text-[#16451F]'"
            [style.transition-delay]="mobileOpen() ? (i * 50) + 'ms' : '0ms'"
          >
            {{ link.label }}
          </a>
        }
        <div class="mt-2 flex items-center gap-3 border-t border-[#16451F]/5 pt-4">
          <a [href]="loginUrl" (click)="closeMobile()" class="flex-1 rounded-full border-2 border-[#16451F]/15 px-5 py-3 text-center text-sm font-semibold text-[#16451F]">
            Se connecter
          </a>
          <a [routerLink]="['/auth/register']" (click)="closeMobile()" class="flex-1 rounded-full bg-gradient-to-r from-[#F2A900] to-[#D99700] px-5 py-3 text-center text-sm font-semibold text-[#16451F]">
            S'inscrire
          </a>
        </div>
      </nav>
    </div>
  </div>
</header>
