server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Proxy token exchange to gateway (same-origin, no CORS needed)
    # `gateway:9000` = DNS Docker network interne. Le service `gateway` est
    # résolu dans le même compose stack (sira-test ou sira-prod). $host
    # propage le Host original du browser (test.sira-guinee.com /
    # sira-guinee.com) sans hardcode.
    location /token-proxy/ {
        proxy_pass http://gateway:9000/authorization/oauth2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass_request_headers on;
    }

    # Proxy API calls to gateway (same-origin, no CORS needed)
    location /api/ {
        proxy_pass http://gateway:9000/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass_request_headers on;
    }

    # Reverse-proxy direct /immo/ → gateway → immobilierservice.
    # Le getter Photo.getUrl() retourne /immo/photos/{uuid} (URL relative —
    # cf dette minio-15-photos-relatives). Le browser charge l'image depuis
    # le hostname web courant (test.sira-guinee.com / sira-guinee.com), qui
    # doit donc savoir router /immo/ vers le backend immo (servePhoto public,
    # cf ResourceServerConfig permitAll "/immo/photos/*").
    location /immo/ {
        proxy_pass http://gateway:9000/immo/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass_request_headers on;
    }

    # Angular SPA - route all requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Health check endpoint
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
